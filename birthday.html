<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Cinematic Celebration</title>
    <style>
        :root { --gold: #d4af37; --dark: #050505; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--dark); color: white; font-family: 'Cinzel', serif; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        /* Background Starfield */
        #canvas { position: fixed; top: 0; left: 0; z-index: 1; }

        /* Hidden Video Layer */
        #player { position: absolute; width: 0; height: 0; pointer-events: none; }

        .content {
            position: relative; z-index: 10; text-align: center; 
            background: rgba(0, 0, 0, 0.6); padding: 60px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            backdrop-filter: blur(8px);
            box-shadow: 0 0 100px rgba(0,0,0,1);
            opacity: 0; animation: fadeIn 3s ease-out forwards;
        }

        h1 {
            font-size: 3.5rem; letter-spacing: 12px; margin: 0;
            background: linear-gradient(to bottom, #fcf6ba, #bf953f);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 300; text-transform: uppercase;
        }

        .subtitle { letter-spacing: 5px; color: var(--gold); font-size: 0.9rem; margin-bottom: 30px; opacity: 0.8; }

        .btn {
            background: transparent; border: 1px solid var(--gold); color: var(--gold);
            padding: 15px 50px; font-size: 12px; letter-spacing: 5px;
            cursor: pointer; transition: 0.8s; text-transform: uppercase;
        }

        .btn:hover { background: var(--gold); color: black; box-shadow: 0 0 30px var(--gold); }

        #message {
            margin-top: 30px; font-size: 1.5rem; letter-spacing: 3px;
            min-height: 1.5em; color: white; display: none;
        }

        @keyframes fadeIn { to { opacity: 1; } }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <canvas id="canvas"></canvas>
    
    <div id="player"></div>

    <div class="content">
        <p class="subtitle">PREPARING FOR GLORY</p>
        <h1>HAPPIEST BIRTHDAY KARTHIK</h1>
        <p class="subtitle">AN EXTRAORDINARY JOURNEY CONTINUES</p>
        <button class="btn" onclick="startExperience()">Begin Sequence</button>
        <div id="message"></div>
    </div>

    <script>
        // 1. MUSIC CONFIGURATION
        // Replace the ID below with any YouTube Video ID (the letters after v=)
        const VIDEO_ID = '4p_YAs8lK6g'; // Default: Cinematic Epic Music

        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0', width: '0', videoId: VIDEO_ID,
                playerVars: { 'autoplay': 0, 'controls': 0, 'showinfo': 0, 'rel': 0 },
                events: { 'onReady': onPlayerReady }
            });
        }
        function onPlayerReady(event) { console.log("Audio Ready"); }

        // 2. ANIMATION LOGIC
        function startExperience() {
            // Play Music
            player.playVideo();
            
            // UI Transition
            document.querySelector('.btn').style.display = 'none';
            const msgDiv = document.getElementById('message');
            msgDiv.style.display = 'block';
            
            // Typewriter Effect
            const text = "May your new chapter be your greatest masterpiece yet...";
            let i = 0;
            function type() {
                if (i < text.length) {
                    msgDiv.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, 100);
                }
            }
            type();

            // Star Speedup
            stars.forEach(s => s.speed *= 15);
        }

        // 3. STARFIELD BACKGROUND
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<250; i++) {
                stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*1.5, speed: Math.random()*0.3 });
            }
        }
        function animate() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
                s.y -= s.speed; if(s.y < 0) s.y = canvas.height;
            });
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', init);
        init(); animate();
    </script>
</body>
</html>
