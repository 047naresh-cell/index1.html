<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday KARTHIK❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  overflow: hidden;
  color: white;
}

.card {
  width: 90%;
  max-width: 380px;
  margin: 70px auto;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
}

h1 {
  font-size: 28px;
}

.glow {
  font-size: 24px;
  font-weight: bold;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px white; }
  to { text-shadow: 0 0 25px yellow, 0 0 40px pink; }
}

button {
  padding: 12px 25px;
  border: none;
  border-radius: 10px;
  background: white;
  color: #ff4d6d;
  font-size: 16px;
  cursor: pointer;
  margin-top: 20px;
}

.hidden {
  display: none;
  margin-top: 20px;
  font-size: 17px;
}

.final {
  margin-top: 20px;
  font-size: 20px;
  font-weight: bold;
  animation: glow 1.5s infinite alternate;
}

.heart {
  position: fixed;
  animation: float 4s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<audio id="music" loop>
  <source src="https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.mid" type="audio/midi">
</audio>

<div class="card">
  <h1>Happy Birthday 🎂</h1>
  <div class="glow">KARTHIK ❤️</div>
  <p> MY ONLY PARTNER IN EVERY CRIME.</p>
  
  <button onclick="startSurprise()">Open Your Surprise 🎁</button>
  
  <div class="hidden" id="message">
    🌸 BUDDY, TODAY IS YOURS ...<br><br>
    HAVE FUN AND  SO, SAD U ARE  IN DRY STATE <br><br>
    PARTY PARTY PARTY, 💖<br><br>
    MAY THIS YEAR BRINGS LOTS OF LOVE  🎉
    
    <div class=>HAVE A BLAST DAA DK  ❤️</div>
  <div class = "final"> IAM COMING,,,,,,,,,
</div>

<script>
function startSurprise() {
  document.getElementById("message").style.display = "block";
  document.getElementById("music").play();
  startHearts();
}

function startHearts() {
  setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 25 + 15 + "px";
    document.body.appendChild(heart);
    setTimeout(() => { heart.remove(); }, 4000);
  }, 250);
}
</script>

</body>
</html>
